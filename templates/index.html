<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modern Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <aside class="sidebar">
    <h2>⚡ MyApp</h2>
    <ul>
      <li>🏠 Home</li>
      <li>📊 Dashboard</li>
      <li>🖼 Gallery</li>
      <li>⚙ Settings</li>
    </ul>
  </aside>

  <main class="main">
    <header>
      <h1>Dashboard</h1>
    </header>

    <section class="cards">
      <div class="card">Users <h2>120</h2></div>
      <div class="card">Revenue <h2>$4500</h2></div>
      <div class="card">Orders <h2>75</h2></div>
    </section>

    <section class="gallery">
      <h2>Gallery</h2>
      <img src="https://picsum.photos/300/200">
      <img src="https://picsum.photos/301/200">
      <img src="https://picsum.photos/302/200">
    </section>

  </main>

</div>

</body>
</html>
