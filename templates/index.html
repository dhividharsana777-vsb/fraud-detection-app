<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fraud Detection App</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- tsParticles CDN -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
  <style>
    /* Make particles fill the background */
    #tsparticles {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
  <!-- Particle Background -->
  <div id="tsparticles"></div>

  <!-- App Container -->
  <div class="bg-gray-800 bg-opacity-80 rounded-xl shadow-2xl p-10 max-w-lg text-center">
    <h1 class="text-4xl font-bold mb-6 text-indigo-400">Fraud Detection App</h1>
    <p class="text-lg mb-6">Real-time fraud detection powered by AI.</p>
    <button class="px-6 py-3 bg-indigo-500 hover:bg-indigo-600 rounded-lg text-white font-semibold transition">
      Run Detection
    </button>
  </div>

  <!-- Particle Config -->
  <script>
    tsParticles.load("tsparticles", {
      background: { color: "transparent" },
      particles: {
        number: { value: 80 },
        color: { value: "#65d6ce" },
        shape: { type: "circle" },
        opacity: { value: 0.5 },
        size: { value: 3 },
        move: { enable: true, speed: 2, direction: "none", random: false, straight: false, outModes: "out" },
        links: { enable: true, color: "#65d6ce", distance: 150, opacity: 0.4, width: 1 }
      },
      interactivity: {
        events: {
          onHover: { enable: true, mode: "repulse" },
          onClick: { enable: true, mode: "push" }
        },
        modes: {
          repulse: { distance: 100 },
          push: { quantity: 4 }
        }
      }
    });
  </script>
</body>
</html>
