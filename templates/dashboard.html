<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(135deg,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* GLASS CARD */
.container{
    width:400px;
    padding:30px;
    border-radius:20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
    animation:fade 1s ease;
}

/* TITLE */
h2{
    text-align:center;
    margin-bottom:20px;
}

/* INPUTS */
input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    outline:none;
}

/* SLIDER */
.slider{
    width:100%;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#00ffcc;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00ccaa;
    transform:scale(1.05);
}

/* LINKS */
.links{
    text-align:center;
    margin-top:15px;
}

.links a{
    color:#00ffcc;
    margin:0 10px;
    text-decoration:none;
}

/* ANIMATION */
@keyframes fade{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1;}
}

</style>

</head>

<body>

<div class="container">

    <h2>👋 Welcome {{user}}</h2>

    <form action="/predict" method="post">

        <label>🌍 Transaction Location</label>
        <select name="location">
            <option value="0">Local</option>
            <option value="1">Foreign</option>
        </select>

        <label>📱 Device Type</label>
        <select name="device">
            <option value="0">Trusted Device</option>
            <option value="1">New Device</option>
        </select>

        <label>🎚️ Device Trust Score</label>
        <input type="range" name="score" min="0" max="100" class="slider">

        <label>⚡ Transaction Speed</label>
        <input type="number" name="velocity" placeholder="e.g. 5 transactions">

        <button>🚀 Check Fraud</button>
    </form>

    <div class="links">
        <a href="/history">📊 History</a>
        <a href="/logout">🚪 Logout</a>
    </div>

</div>

</body>
</html>
