<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
}

canvas{
    margin-top:50px;
}
</style>

</head>

<body>

<h2>📊 Fraud History</h2>

<canvas id="chart" width="400" height="200"></canvas>

<script>
let data = {{values|tojson}};

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:data.map((_,i)=>"Txn "+(i+1)),
datasets:[{
label:"Fraud %",
data:data,
borderColor:"#00ffcc",
fill:false
}]
}
});
</script>

<br>
<a href="/dashboard" style="color:white;">⬅ Back</a>

</body>
</html>
