<!DOCTYPE html>
<html>
<head>
<style>
body{
    background:black;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

.card{
    margin-top:150px;
    padding:40px;
    border-radius:20px;
    display:inline-block;
    background:rgba(255,255,255,0.1);
    animation:pop 0.5s ease;
}

h1{
    font-size:40px;
}

.green{color:#00ff88;}
.red{color:#ff4444;}

@keyframes pop{
    from{transform:scale(0.5); opacity:0;}
    to{transform:scale(1);}
}
</style>
</head>

<body>

<div class="card">

<h1>Fraud Probability</h1>

{% if result > 50 %}
<h1 class="red">🚨 {{result}} % Risk</h1>
{% else %}
<h1 class="green">✅ {{result}} % Safe</h1>
{% endif %}

<br>
<a href="/dashboard" style="color:white;">⬅ Back</a>

</div>

</body>
</html>
